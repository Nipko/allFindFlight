# AllfindFlight production stack for Portainer.
#
# Deploy as a Portainer Stack:
#   1. Repository URL: https://github.com/Nipko/allFindFlight
#   2. Compose path: infra/docker-compose.prod.yml
#   3. Environment variables (Portainer "Environment variables" panel):
#        POSTGRES_PASSWORD       (required, strong)
#        TUNNEL_TOKEN            (required, from Cloudflare Zero Trust)
#        GOOGLE_MAPS_API_KEY     (optional)
#        AMADEUS_CLIENT_ID       (optional)
#        AMADEUS_CLIENT_SECRET   (optional)
#        TRAVELPAYOUTS_TOKEN     (optional)
#        PROXY_URL               (optional, for scrapers)
#        IMAGE_TAG               (optional, defaults to "latest")
#        REGISTRY                (optional, e.g. ghcr.io/nipko)
#
# Cloudflare Tunnel routing (configure in Cloudflare Zero Trust dashboard):
#   planetour.cloud  -> http://frontend:3000
#   www.planetour.cloud -> http://frontend:3000  (optional)
# No port is published to the host. All ingress goes through cloudflared.

services:
  postgres:
    image: postgres:16-alpine
    container_name: allfind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: allfind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: allfind
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allfind"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    container_name: allfind-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  backend:
    image: ${REGISTRY:-ghcr.io/nipko}/allfind-backend:${IMAGE_TAG:-latest}
    container_name: allfind-backend
    restart: unless-stopped
    environment:
      ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://allfind:${POSTGRES_PASSWORD}@postgres:5432/allfind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      TRAVELPAYOUTS_TOKEN: ${TRAVELPAYOUTS_TOKEN:-}
      PROXY_URL: ${PROXY_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [internal]

  worker:
    image: ${REGISTRY:-ghcr.io/nipko}/allfind-backend:${IMAGE_TAG:-latest}
    container_name: allfind-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-l", "info", "--concurrency=2"]
    environment:
      ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://allfind:${POSTGRES_PASSWORD}@postgres:5432/allfind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      TRAVELPAYOUTS_TOKEN: ${TRAVELPAYOUTS_TOKEN:-}
      PROXY_URL: ${PROXY_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  frontend:
    image: ${REGISTRY:-ghcr.io/nipko}/allfind-frontend:${IMAGE_TAG:-latest}
    container_name: allfind-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks: [internal]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: allfind-cloudflared
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?TUNNEL_TOKEN is required}
    depends_on:
      frontend:
        condition: service_started
    networks: [internal]

volumes:
  postgres-data:
  redis-data:

networks:
  internal:
    driver: bridge
